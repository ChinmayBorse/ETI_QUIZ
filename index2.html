.umeta{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted)}

.qmeta{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted);margin-bottom:4px}

.slabel{color:var(--muted);font-size:.78rem;margin-bottom:24px}
.sbrkd{display:flex;justify-content:center;gap:28px;margin-bottom:28px}
.sbitem{text-align:center}

.ract{display:flex;gap:11px;justify-content:center;flex-wrap:wrap}

.abtn.s{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.revsec{margin-top:26px;text-align:left}
.revtitle{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--muted);margin-bottom:14px;text-transform:uppercase;letter-spacing:.1em}

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let cUnit=null,qs=[],cIdx=0,score=0,answered=false,userAns=[];

// ─────────────────────────────────────────────────────────────────────────────
// HOME
// ─────────────────────────────────────────────────────────────────────────────
function renderHome(){
  const g=document.getElementById('ugrid');g.innerHTML='';
  UNITS.forEach(u=>{
    const c=document.createElement('div');c.className='ucard';
    c.style.setProperty('--uc',u.color);
    const pct=Math.round((u.q.filter((_,i)=>i%4===u.q[Math.floor(i/Math.ceil(u.q.length/4))]?.a).length/u.q.length)*100)||0;
    c.innerHTML=`<span class="uicon">${u.icon}</span><h3>${u.title}</h3><div class="umeta">${u.q.length} deep questions | Balanced A/B/C/D</div><div class="ubadge" style="background:${u.color}">Start Quiz →</div>`;
    c.onclick=()=>startQuiz(u);g.appendChild(c);
  });
}
function goHome(){
  document.getElementById('home').style.display='block';
  document.getElementById('quiz').style.display='none';
  document.getElementById('results').style.display='none';
}

// ─────────────────────────────────────────────────────────────────────────────
// QUIZ
// ─────────────────────────────────────────────────────────────────────────────
function startQuiz(unit){
  cUnit=unit;
  // Shuffle questions while keeping answer balance
  qs=[...unit.q];
  for(let i=qs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[qs[i],qs[j]]=[qs[j],qs[i]];}
  cIdx=0;score=0;answered=false;userAns=new Array(qs.length).fill(null);
  document.getElementById('home').style.display='none';
  document.getElementById('results').style.display='none';
  document.getElementById('quiz').style.display='block';
  document.getElementById('quiz').style.setProperty('--uc',unit.color);
  document.getElementById('qunitlbl').textContent=unit.title;
  buildNav();renderQ();
}
function buildNav(){
  const n=document.getElementById('qnav');n.innerHTML='';
  qs.forEach((_,i)=>{const d=document.createElement('div');d.className='qdot';d.textContent=i+1;d.id=`d${i}`;n.appendChild(d);});
}
function updateNav(){
  qs.forEach((_,i)=>{const d=document.getElementById(`d${i}`);if(!d)return;
    d.className='qdot';if(userAns[i]!==null){d.classList.add(userAns[i]===qs[i].a?'ac':'aw');}});
}
function renderQ(){
  const q=qs[cIdx];answered=false;
  const pct=(cIdx/qs.length)*100;
  document.getElementById('progfill').style.width=pct+'%';
  document.getElementById('qmeta').textContent=`Q ${cIdx+1} / ${qs.length}`;
  document.getElementById('slive').textContent=`Score: ${score} / ${cIdx}`;
  document.getElementById('qtext').textContent=`Q${cIdx+1}. ${q.q}`;
  const ol=document.getElementById('optlist');ol.innerHTML='';
  const lbs=['A','B','C','D'];
  q.o.forEach((opt,i)=>{
    const b=document.createElement('button');b.className='optbtn';
    b.innerHTML=`<span class="olbl">${lbs[i]}</span><span>${opt}</span>`;
    b.onclick=()=>selectAns(i);ol.appendChild(b);
  });
  const fb=document.getElementById('fbbox');fb.className='fbbox';fb.style.display='none';fb.textContent='';
  document.getElementById('nxtbtn').style.display='none';
  updateNav();
}
function selectAns(chosen){
  if(answered)return;answered=true;
  const q=qs[cIdx];userAns[cIdx]=chosen;
  const btns=document.querySelectorAll('.optbtn');
  btns.forEach((b,i)=>{b.disabled=true;if(i===q.a)b.classList.add('correct');else if(i===chosen&&chosen!==q.a)b.classList.add('wrong');});
  const fb=document.getElementById('fbbox');fb.style.display='block';
  if(chosen===q.a){score++;fb.className='fbbox correct';fb.textContent='✓ Correct!';}
  else{fb.className='fbbox wrong';fb.textContent=`✗ Wrong. Correct: ${['A','B','C','D'][q.a]}) ${q.o[q.a]}`;}
  document.getElementById('slive').textContent=`Score: ${score} / ${cIdx+1}`;
  const nb=document.getElementById('nxtbtn');nb.style.display='block';
  nb.textContent=cIdx>=qs.length-1?'VIEW RESULTS →':'NEXT →';
  updateNav();
}
function nextQ(){
  if(cIdx>=qs.length-1){showResults();return;}
  cIdx++;renderQ();window.scrollTo({top:0,behavior:'smooth'});
}

// ─────────────────────────────────────────────────────────────────────────────
// RESULTS
// ─────────────────────────────────────────────────────────────────────────────
function showResults(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('results').style.display='block';
  const tot=qs.length,wrong=tot-score,pct=Math.round((score/tot)*100);
  document.getElementById('rcard').style.setProperty('--uc',cUnit.color);
  let emoji,title,grade,gc;
  if(pct>=90){emoji='🏆';title='Outstanding!';grade='O – Outstanding';gc='#00e676';}
  else if(pct>=75){emoji='🎯';title='Excellent Work!';grade='A – Excellent';gc='#69f0ae';}
  else if(pct>=60){emoji='👍';title='Good Job!';grade='B – Good';gc='#ffeb3b';}
  else if(pct>=45){emoji='📖';title='Keep Studying!';grade='C – Average';gc='#ff9800';}
  else{emoji='💪';title='Needs Improvement';grade='D – Below Average';gc='#ff5252';}
  document.getElementById('remoji').textContent=emoji;
  document.getElementById('rtitle').textContent=title;
  document.getElementById('rsub').textContent=cUnit.title;
  document.getElementById('sdisp').textContent=pct+'%';
  document.getElementById('sdisp').style.color=cUnit.color;
  document.getElementById('rc').textContent=score;
  document.getElementById('rt').textContent=tot;
  document.getElementById('rw').textContent=wrong;
  const gb=document.getElementById('gbadge');
  gb.textContent=`Grade: ${grade}`;
  gb.style.cssText=`background:${gc}22;border:1px solid ${gc};color:${gc}`;
  // Review
  const rev=document.getElementById('revsec');
  const wqs=qs.filter((_,i)=>userAns[i]!==null&&userAns[i]!==qs[i].a);
  if(!wqs.length){rev.innerHTML='<div class="revtitle">// ALL CORRECT! 🎉</div>';}
  else{
    let h=`<div class="revtitle">// Review Wrong Answers (${wrong})</div>`;
    qs.forEach((q,i)=>{if(userAns[i]!==null&&userAns[i]!==q.a){
      const ua=userAns[i],ca=q.a,ls=['A','B','C','D'];
      h+=`<div class="revitem"><div class="revq">Q${i+1}. ${q.q}</div><div class="revy">✗ Your answer: ${ls[ua]}) ${q.o[ua]}</div><div class="revc">✓ Correct: ${ls[ca]}) ${q.o[ca]}</div></div>`;
    }});
    rev.innerHTML=h;
  }
}
function retryQ(){startQuiz(cUnit);}

// INIT
renderHome();
</script>
