  .q-dot.answered-wrong { background: rgba(255,82,82,0.2); border-color: var(--wrong); color: var(--wrong); }

  @media (max-width: 600px) {
    .question-card { padding: 20px 16px; }
    .results-card { padding: 24px 16px; }
    .score-display { font-size: 2.5rem; }
    .header h1 { font-size: 1.2rem; }
    .q-nav { max-height: 80px; overflow: hidden; }
  }
</style>
</head>

// ══════════════════════════════════════════════
// APP STATE
// ══════════════════════════════════════════════
let currentUnit = null;
let questions = [];
let currentQ = 0;
let score = 0;
let answered = false;
let userAnswers = [];

// ══════════════════════════════════════════════
// HOME
// ══════════════════════════════════════════════
function renderHome() {
  const grid = document.getElementById('unit-grid');
  grid.innerHTML = '';
  UNITS.forEach(u => {
    const card = document.createElement('div');
    card.className = 'unit-card';
    card.style.setProperty('--uc', u.color);
    card.innerHTML = `
      <span class="unit-icon">${u.icon}</span>
      <h3>${u.title}</h3>
      <div class="unit-meta">${u.questions.length} questions</div>
      <div class="unit-badge" style="background:${u.color}">Start Quiz →</div>
    `;
    card.onclick = () => startQuiz(u);
    grid.appendChild(card);
  });
}

function goHome() {
  document.getElementById('home-screen').style.display = 'block';
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'none';
}

// ══════════════════════════════════════════════
// QUIZ
// ══════════════════════════════════════════════
function startQuiz(unit) {
  currentUnit = unit;
  questions = [...unit.questions];
  // Shuffle questions
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }
  currentQ = 0;
  score = 0;
  answered = false;
  userAnswers = new Array(questions.length).fill(null);

  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('quiz-screen').style.setProperty('--uc', unit.color);
  document.getElementById('quiz-unit-label').textContent = unit.title;

  buildQNav();
  renderQuestion();
}

function buildQNav() {
  const nav = document.getElementById('q-nav');
  nav.innerHTML = '';
  questions.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'q-dot';
    dot.textContent = i + 1;
    dot.id = `dot-${i}`;
    nav.appendChild(dot);
  });
}

function updateQNav() {
  questions.forEach((_, i) => {
    const dot = document.getElementById(`dot-${i}`);
    if (!dot) return;
    dot.className = 'q-dot';
    if (userAnswers[i] !== null) {
      const correct = userAnswers[i] === questions[i].ans;
      dot.classList.add(correct ? 'answered-correct' : 'answered-wrong');
    }
  });
}

function renderQuestion() {
  const q = questions[currentQ];
  answered = false;

  // Update progress
  const pct = (currentQ / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-counter').textContent = `Question ${currentQ + 1} of ${questions.length}`;
  document.getElementById('score-live').textContent = `Score: ${score} / ${currentQ}`;

  // Question text
  document.getElementById('q-text').textContent = `Q${currentQ + 1}. ${q.q}`;

  // Options
  const optList = document.getElementById('options-list');
  optList.innerHTML = '';
  const labels = ['A','B','C','D'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-label">${labels[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    optList.appendChild(btn);
  });

  // Reset feedback
  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box';
  fb.style.display = 'none';
  fb.textContent = '';

  document.getElementById('next-btn').style.display = 'none';
  updateQNav();
}

function selectAnswer(chosen) {
  if (answered) return;
  answered = true;

  const q = questions[currentQ];
  const correct = q.ans;
  userAnswers[currentQ] = chosen;

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    else if (i === chosen && chosen !== correct) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback-box');
  fb.style.display = 'block';
  if (chosen === correct) {
    score++;
    fb.className = 'feedback-box correct';
    fb.textContent = '✓ Correct! Well done.';
  } else {
    fb.className = 'feedback-box wrong';
    fb.textContent = `✗ Wrong. Correct answer: ${String.fromCharCode(65+correct)}) ${q.opts[correct]}`;
  }

  document.getElementById('score-live').textContent = `Score: ${score} / ${currentQ + 1}`;
  updateQNav();

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'block';
  if (currentQ >= questions.length - 1) {
    nextBtn.textContent = 'VIEW RESULTS →';
  } else {
    nextBtn.textContent = 'NEXT QUESTION →';
  }
}

function nextQuestion() {
  if (currentQ >= questions.length - 1) {
    showResults();
    return;
  }
  currentQ++;
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════
// RESULTS
// ══════════════════════════════════════════════
function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';

  const total = questions.length;
  const wrong = total - score;
  const pct = Math.round((score / total) * 100);

  const card = document.getElementById('results-card');
  card.style.setProperty('--uc', currentUnit.color);

  // Emoji & title
  let emoji, title, grade, gradeColor;
  if (pct >= 90) { emoji='🏆'; title='Outstanding!'; grade='O (Outstanding)'; gradeColor='#00e676'; }
  else if (pct >= 75) { emoji='🎯'; title='Excellent Work!'; grade='A (Excellent)'; gradeColor='#69f0ae'; }
  else if (pct >= 60) { emoji='👍'; title='Good Job!'; grade='B (Good)'; gradeColor='#ffeb3b'; }
  else if (pct >= 45) { emoji='📖'; title='Keep Studying!'; grade='C (Average)'; gradeColor='#ff9800'; }
  else { emoji='💪'; title='Needs Improvement'; grade='D (Below Average)'; gradeColor='#ff5252'; }

  document.getElementById('results-emoji').textContent = emoji;
  document.getElementById('results-title').textContent = title;
  document.getElementById('results-subtitle').textContent = currentUnit.title;
  document.getElementById('score-display').textContent = pct + '%';
  document.getElementById('score-display').style.color = currentUnit.color;
  document.getElementById('res-correct').textContent = score;
  document.getElementById('res-total').textContent = total;
  document.getElementById('res-wrong').textContent = wrong;

  const badge = document.getElementById('grade-badge');
  badge.textContent = `Grade: ${grade}`;
  badge.style.background = gradeColor + '22';
  badge.style.border = `1px solid ${gradeColor}`;
  badge.style.color = gradeColor;

  // Review wrong answers
  const review = document.getElementById('review-section');
  const wrongQs = questions.filter((_, i) => userAnswers[i] !== null && userAnswers[i] !== questions[i].ans);
  if (wrongQs.length === 0) {
    review.innerHTML = '<div class="review-title">// ALL ANSWERS CORRECT! 🎉</div>';
  } else {
    let html = `<div class="review-title">// Review Wrong Answers (${wrong})</div>`;
    questions.forEach((q, i) => {
      if (userAnswers[i] !== null && userAnswers[i] !== q.ans) {
        const ua = userAnswers[i];
        const ca = q.ans;
        html += `
          <div class="review-item">
            <div class="review-q">Q${i+1}. ${q.q}</div>
            <div class="review-your">✗ Your answer: ${String.fromCharCode(65+ua)}) ${q.opts[ua]}</div>
            <div class="review-correct">✓ Correct: ${String.fromCharCode(65+ca)}) ${q.opts[ca]}</div>
          </div>`;
      }
    });
    review.innerHTML = html;
  }
}

function retryQuiz() {
  startQuiz(currentUnit);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
renderHome();
</script>
